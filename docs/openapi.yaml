openapi: 3.1.0
info:
  title: Rooms API
  version: 0.6.0
  description: |
    Contract for the Rooms MVP backend. GitHub Pages remains a static frontend;
    the local Fastify service provides PostgreSQL-backed API endpoints.
servers:
  - url: http://localhost:3001
    description: Local development
  - url: https://api.rooms.example
    description: Production placeholder
tags:
  - name: Public
  - name: Auth
  - name: Client
  - name: Partner
  - name: Admin
  - name: Payments

paths:
  /health:
    get:
      tags: [Public]
      operationId: getHealth
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required: [status, database, storage, time]
                properties:
                  status: {type: string, const: ok}
                  database: {type: string, enum: [up, down]}
                  storage: {type: string, enum: [memory, postgresql]}
                  time: {type: string, format: date-time}

  /v1/cities:
    get:
      tags: [Public]
      operationId: listCities
      responses:
        '200':
          description: Supported cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/City'

  /v1/cities/{cityId}/stats:
    get:
      tags: [Public]
      operationId: getCityStats
      parameters:
        - name: cityId
          in: path
          required: true
          description: City id returned by /v1/cities or its exact display name.
          schema: {type: string}
      responses:
        '200':
          description: Public supply counts and privacy-safe audience bucket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityStats'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/rooms:
    get:
      tags: [Public]
      operationId: searchRooms
      parameters:
        - {name: city, in: query, required: true, schema: {type: string}}
        - {name: date, in: query, schema: {type: string, format: date}}
        - {name: time, in: query, schema: {type: string, pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'}}
        - {name: durationMinutes, in: query, schema: {type: integer, minimum: 30, multipleOf: 30}}
        - {name: guests, in: query, schema: {type: integer, minimum: 1}}
        - {name: type, in: query, schema: {type: string}}
        - {name: features, in: query, schema: {type: array, items: {type: string}}, style: form, explode: false}
        - {name: maxPricePerHour, in: query, schema: {type: number, minimum: 0}}
        - {name: sort, in: query, schema: {type: string, enum: [rating, price, capacity], default: rating}}
        - {name: cursor, in: query, schema: {type: string}}
      responses:
        '200':
          description: Published rooms and optional availability summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomSearchResult'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/rooms/{roomId}:
    get:
      tags: [Public]
      operationId: getRoom
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - {name: date, in: query, schema: {type: string, format: date}}
      responses:
        '200':
          description: Room detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/rooms/{roomId}/reviews:
    get:
      tags: [Public]
      operationId: listRoomReviews
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Approved reviews for a published room with privacy-safe author names
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicReviewPage'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/availability/search:
    post:
      tags: [Public]
      operationId: searchAvailability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityRequest'
      responses:
        '200':
          description: Free starts and maximum duration for each start
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/client/register:
    post:
      tags: [Auth]
      operationId: registerClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRegistration'
      responses:
        '201':
          description: Client account and session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: {type: string}
                password: {type: string, minLength: 1}
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/password-reset/request:
    post:
      tags: [Auth]
      operationId: requestPasswordReset
      description: Always returns the same accepted response so an account cannot be discovered by login enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login]
              properties:
                login: {type: string, minLength: 3, maxLength: 254}
      responses:
        '202':
          description: Reset delivery accepted regardless of whether the account exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetAccepted'
        '429':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/password-reset/confirm:
    post:
      tags: [Auth]
      operationId: confirmPasswordReset
      description: Consumes a one-time reset token, changes the password and revokes every existing session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: {type: string, minLength: 32, maxLength: 200}
                newPassword: {type: string, minLength: 8, maxLength: 128}
      responses:
        '204': {description: Password changed and existing sessions revoked}
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshSession
      description: Rotates the HttpOnly refresh cookie and returns a new access token.
      security:
        - refreshCookie: []
      responses:
        '200':
          description: Session refreshed and refresh cookie rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      security:
        - bearerAuth: []
        - refreshCookie: []
      responses:
        '204': {description: Session revoked}

  /v1/me:
    get:
      tags: [Client]
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Client]
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientProfileUpdate'
      responses:
        '200':
          description: Updated client profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/me/sessions:
    get:
      tags: [Client]
      operationId: listCurrentUserSessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active sessions owned by the current user
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: {$ref: '#/components/schemas/UserSession'}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me/sessions/others:
    delete:
      tags: [Client]
      operationId: revokeOtherCurrentUserSessions
      security:
        - bearerAuth: []
      responses:
        '204': {description: Every active session except the current one was revoked}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me/sessions/{sessionId}:
    delete:
      tags: [Client]
      operationId: revokeCurrentUserSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204': {description: Owned session revoked}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/me/notification-settings:
    get:
      tags: [Client]
      operationId: getNotificationSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification channels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSettings'
    patch:
      tags: [Client]
      operationId: updateNotificationSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSettings'
      responses:
        '200':
          description: Updated channels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSettings'

  /v1/me/notification-settings/test:
    post:
      tags: [Client]
      operationId: testNotificationSettings
      security:
        - bearerAuth: []
      responses:
        '202':
          description: Test deliveries accepted by the server queue
          content:
            application/json:
              schema:
                type: object
                required: [accepted, deliveries]
                properties:
                  accepted: {type: boolean, const: true}
                  deliveries:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationDelivery'
        '409':
          description: All external channels are disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/me/notification-deliveries:
    get:
      tags: [Client]
      operationId: listOwnNotificationDeliveries
      security:
        - bearerAuth: []
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [queued, processing, sent, failed, cancelled]}}
        - {name: channel, in: query, schema: {type: string, enum: [email, telegram]}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200':
          description: Masked delivery history for the authenticated account
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationDelivery'
  /v1/bookings:
    get:
      tags: [Client]
      operationId: listClientBookings
      security:
        - bearerAuth: []
      parameters:
        - {name: statusGroup, in: query, schema: {type: string, enum: [active, completed, cancelled, all]}}
      responses:
        '200':
          description: Client bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
    post:
      tags: [Client]
      operationId: createBooking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreate'
      responses:
        '201':
          description: New request. The slot is not blocked yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '409':
          $ref: '#/components/responses/SlotConflict'

  /v1/bookings/{bookingId}:
    get:
      tags: [Client]
      operationId: getBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking visible to the current role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/bookings/{bookingId}/cancel:
    post:
      tags: [Client]
      operationId: cancelBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: {type: string, minLength: 3, maxLength: 1000}
      responses:
        '200':
          description: Cancelled booking or refund review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'

  /v1/bookings/{bookingId}/messages:
    get:
      tags: [Client, Partner]
      operationId: listBookingMessages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Visible booking messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookingMessage'
    post:
      tags: [Client, Partner]
      operationId: createBookingMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: {type: string, minLength: 1, maxLength: 1000}
      responses:
        '201':
          description: Message accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingMessage'
        '422':
          description: Direct contact details are blocked before payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bookings/{bookingId}/proposal/accept:
    post:
      tags: [Client]
      operationId: acceptBookingTimeProposal
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [proposalId]
              properties:
                proposalId: {type: string, format: uuid}
      responses:
        '200':
          description: Proposal accepted and all booking rooms held for 15 minutes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Proposal changed or its slot is no longer available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bookings/{bookingId}/proposal/decline:
    post:
      tags: [Client]
      operationId: declineBookingTimeProposal
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [proposalId]
              properties:
                proposalId: {type: string, format: uuid}
      responses:
        '200':
          description: Proposal declined and request returned to the partner queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Proposal has already changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bookings/{bookingId}/payment-intent:
    post:
      tags: [Payments]
      operationId: createPaymentIntent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '201':
          description: Server-calculated Sber payment intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '409':
          $ref: '#/components/responses/SlotConflict'

  /v1/payments/{paymentId}/demo-complete:
    post:
      tags: [Payments]
      operationId: completeDemoPayment
      description: Local development adapter. Disabled when ENABLE_DEMO_PAYMENTS is false.
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: The hold was atomically converted into a paid booking
          content:
            application/json:
              schema:
                type: object
                required: [payment, booking]
                properties:
                  payment: {$ref: '#/components/schemas/PaymentIntent'}
                  booking: {$ref: '#/components/schemas/Booking'}
        '409':
          description: Hold expired or booking state changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/payments/webhooks/sber:
    post:
      tags: [Payments]
      operationId: handleSberWebhook
      parameters:
        - {name: X-Sber-Signature, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        '204': {description: Event processed idempotently}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/partner/moderation:
    get:
      tags: [Partner]
      operationId: listPartnerModerationHistory
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Moderation history for the venue assigned to the partner
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminModerationRecord'

  /v1/partner/venue:
    get:
      tags: [Partner]
      operationId: getPartnerVenue
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Venue managed by the partner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerVenue'
    patch:
      tags: [Partner]
      operationId: updatePartnerVenue
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerVenueWrite'
      responses:
        '202':
          description: Immediate fields applied and critical fields sent to moderation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerVenue'

  /v1/partner/rooms:
    get:
      tags: [Partner]
      operationId: listPartnerRooms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Partner rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PartnerRoom'
    post:
      tags: [Partner]
      operationId: createPartnerRoom
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerRoomWrite'
      responses:
        '202':
          description: Room draft created and sent to moderation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerRoom'

  /v1/partner/rooms/{roomId}:
    patch:
      tags: [Partner]
      operationId: updatePartnerRoom
      security:
        - bearerAuth: []
      parameters:
        - {name: roomId, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerRoomWrite'
      responses:
        '200':
          description: Operational settings applied and public changes sent to moderation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerRoom'

  /v1/partner/schedule-exceptions/{date}:
    put:
      tags: [Partner]
      operationId: setPartnerScheduleException
      security:
        - bearerAuth: []
      parameters:
        - {name: date, in: path, required: true, schema: {type: string, format: date}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerScheduleExceptionWrite'
      responses:
        '200':
          description: Date-specific schedule saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerVenue'
    delete:
      tags: [Partner]
      operationId: deletePartnerScheduleException
      security:
        - bearerAuth: []
      parameters:
        - {name: date, in: path, required: true, schema: {type: string, format: date}}
      responses:
        '200':
          description: Weekly schedule restored for the date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerVenue'

  /v1/partner/reservations:
    get:
      tags: [Partner]
      operationId: listPartnerReservations
      security:
        - bearerAuth: []
      parameters:
        - name: roomId
          in: query
          schema: {type: string, format: uuid}
        - name: dateFrom
          in: query
          schema: {type: string, format: date}
        - name: dateTo
          in: query
          schema: {type: string, format: date}
        - name: includeCancelled
          in: query
          schema: {type: boolean, default: true}
      responses:
        '200':
          description: Manual bookings and technical blocks belonging to the current partner
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/PartnerReservation'}
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Partner]
      operationId: createPartnerReservation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerReservationWrite'
      responses:
        '201':
          description: Manual booking or technical block created immediately
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PartnerReservation'}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/SlotConflict'

  /v1/partner/reservations/{reservationId}:
    patch:
      tags: [Partner]
      operationId: updatePartnerReservation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PartnerReservationWrite'}
      responses:
        '200':
          description: Updated calendar record
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PartnerReservation'}
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/SlotConflict'
    delete:
      tags: [Partner]
      operationId: deleteTechnicalReservation
      description: Permanently deletes a technical block. Manual bookings must be cancelled instead.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '204':
          description: Technical block deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/partner/reservations/{reservationId}/cancel:
    post:
      tags: [Partner]
      operationId: cancelPartnerReservation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: {type: string, minLength: 3, maxLength: 1000}
      responses:
        '200':
          description: Calendar record cancelled and its time released
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PartnerReservation'}
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/partner/reservations/{reservationId}/restore:
    post:
      tags: [Partner]
      operationId: restorePartnerReservation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '200':
          description: Cancelled calendar record restored after a fresh availability check
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PartnerReservation'}
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/SlotConflict'

  /v1/partner/bookings:
    get:
      tags: [Partner]
      operationId: listPartnerBookings
      security:
        - bearerAuth: []
      parameters:
        - name: statusGroup
          in: query
          schema: {type: string, enum: [new, payment, booked, history, all], default: all}
      responses:
        '200':
          description: Bookings belonging only to venues managed by the current partner
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/partner/bookings/{bookingId}/confirm:
    post:
      tags: [Partner]
      operationId: confirmPartnerBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Slot held for 15 minutes awaiting payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '409':
          $ref: '#/components/responses/SlotConflict'

  /v1/partner/bookings/{bookingId}/reject:
    post:
      tags: [Partner]
      operationId: rejectPartnerBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reason]
              properties:
                reason: {type: string, minLength: 5, maxLength: 1000}
      responses:
        '200':
          description: Request rejected and any unpaid hold released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Booking status no longer allows rejection

  /v1/partner/bookings/{bookingId}/proposal:
    post:
      tags: [Partner]
      operationId: proposeBookingTime
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeProposal'
      responses:
        '200':
          description: Alternative time sent to client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '409':
          description: Booking state changed or the proposed slot is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/admin/moderation:
    get:
      tags: [Admin]
      operationId: listAdminModeration
      security:
        - bearerAuth: []
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [pending, approved, rejected, all], default: all}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 80}}
      responses:
        '200':
          description: Moderation queue and recent decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminModerationRecord'
        '403':
          description: Administrator role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/admin/moderation/{moderationId}/approve:
    post:
      tags: [Admin]
      operationId: approveAdminModeration
      security:
        - bearerAuth: []
      parameters:
        - {name: moderationId, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminModerationDecision'
      responses:
        '200':
          description: Changes applied atomically and moderation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModerationRecord'
        '409':
          description: Moderation was already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/admin/moderation/{moderationId}/reject:
    post:
      tags: [Admin]
      operationId: rejectAdminModeration
      security:
        - bearerAuth: []
      parameters:
        - {name: moderationId, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminModerationDecision'
      responses:
        '200':
          description: Changes rejected and decision exposed to the partner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModerationRecord'
        '400':
          description: Rejection reason is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Moderation was already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/admin/notification-deliveries:
    get:
      tags: [Admin]
      operationId: listNotificationDeliveries
      security:
        - bearerAuth: []
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [queued, processing, sent, failed, cancelled]}}
        - {name: channel, in: query, schema: {type: string, enum: [email, telegram]}}
      responses:
        '200':
          description: Delivery queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationDelivery'

  /v1/admin/migrations/validate:
    post:
      tags: [Admin]
      operationId: validateMigration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        '200':
          description: Collection counts and validation warnings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationValidation'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: rooms_refresh

  parameters:
    RoomId:
      name: roomId
      in: path
      required: true
      description: Permanent UUID or a legacy public slug during frontend migration.
      schema: {type: string}
    BookingId:
      name: bookingId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ReservationId:
      name: reservationId
      in: path
      required: true
      schema: {type: string, format: uuid}

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Unauthorized:
      description: Authentication failed or session expired
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Conflict:
      description: Entity already exists
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    SlotConflict:
      description: One or more rooms are no longer available
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  alternatives:
                    type: array
                    items: {$ref: '#/components/schemas/AvailabilityWindow'}

  schemas:
    City:
      type: object
      required: [id, name, active]
      properties:
        id: {type: string}
        name: {type: string}
        active: {type: boolean}
        pilot: {type: boolean}

    CityStats:
      type: object
      required: [city, publishedVenues, publishedRooms, activeClientsLabel, audienceStage, updatedAt]
      properties:
        city: {$ref: '#/components/schemas/City'}
        publishedVenues: {type: integer, minimum: 0}
        publishedRooms: {type: integer, minimum: 0}
        activeClientsLabel:
          type: [string, 'null']
          description: Public threshold such as 20+, 50+ or 100+; null while the city is launching.
        audienceStage: {type: string, enum: [launching, growing, established]}
        updatedAt: {type: string, format: date-time}

    User:
      type: object
      required: [id, role, name, passwordResetRequired]
      properties:
        id: {type: string, format: uuid}
        role: {type: string, enum: [client, partner, admin, accountant]}
        name: {type: string}
        email: {type: [string, 'null'], format: email}
        phone: {type: [string, 'null']}
        city: {type: [string, 'null']}
        passwordResetRequired: {type: boolean}

    ClientProfileUpdate:
      type: object
      required: [name, email, phone, city]
      properties:
        name: {type: string, minLength: 2, maxLength: 100}
        email: {type: string, format: email}
        phone: {type: string}
        city: {type: string}
        currentPassword: {type: string, description: Required only when newPassword is supplied.}
        newPassword: {type: string, minLength: 8, maxLength: 128}

    AuthSession:
      type: object
      required: [user, accessToken, expiresIn]
      properties:
        user: {$ref: '#/components/schemas/User'}
        accessToken: {type: string}
        expiresIn: {type: integer, description: Seconds}

    PasswordResetAccepted:
      type: object
      required: [accepted, expiresIn, message]
      properties:
        accepted: {type: boolean, const: true}
        expiresIn: {type: integer, const: 900}
        message: {type: string}
        demoToken:
          type: string
          description: Present only when EXPOSE_PASSWORD_RESET_TOKEN is explicitly enabled outside production.
        demoResetUrl:
          type: string
          format: uri
          description: Local demonstration link; a production delivery provider must send the link instead.

    UserSession:
      type: object
      required: [id, expiresAt, createdAt, lastSeenAt, current]
      properties:
        id: {type: string, format: uuid}
        userAgent: {type: [string, 'null']}
        ip: {type: [string, 'null']}
        expiresAt: {type: string, format: date-time}
        createdAt: {type: string, format: date-time}
        lastSeenAt: {type: string, format: date-time}
        current: {type: boolean}

    ClientRegistration:
      type: object
      required: [name, email, phone, city, password, legal]
      properties:
        name: {type: string, minLength: 2}
        email: {type: string, format: email}
        phone: {type: string}
        city: {type: string}
        password: {type: string, minLength: 8}
        legal:
          type: object
          required: [termsVersion, privacyVersion, acceptedAt]
          properties:
            termsVersion: {type: string}
            privacyVersion: {type: string}
            acceptedAt: {type: string, format: date-time}

    Venue:
      type: object
      required: [id, slug, title, city, address, publicationStatus, partnerMode]
      properties:
        id: {type: string, format: uuid}
        slug: {type: string}
        title: {type: string}
        city: {type: string}
        address: {type: string}
        latitude: {type: [number, 'null']}
        longitude: {type: [number, 'null']}
        description: {type: [string, 'null']}
        rules: {type: [string, 'null']}
        amenities: {type: array, items: {type: string}}
        publicationStatus: {type: string, enum: [review, published, hidden]}
        partnerMode: {type: string, enum: [catalog, crm]}
        paymentMethods: {type: array, items: {type: string, enum: [card, cash]}}

    PartnerWeekScheduleDay:
      type: object
      required: [weekday, enabled, opensAtHour, closesAtHour]
      properties:
        weekday: {type: integer, minimum: 1, maximum: 7}
        enabled: {type: boolean}
        opensAtHour: {type: number, minimum: 0, maximum: 23.5, multipleOf: 0.5}
        closesAtHour: {type: number, minimum: 0.5, maximum: 30, multipleOf: 0.5}

    PartnerScheduleException:
      type: object
      required: [date, mode, opensAtHour, closesAtHour, note]
      properties:
        date: {type: string, format: date}
        mode: {type: string, enum: [closed, custom]}
        opensAtHour: {type: [number, 'null']}
        closesAtHour: {type: [number, 'null']}
        note: {type: string}

    PartnerModerationChange:
      type: object
      required: [id, fields, beforeData, proposedData, createdAt]
      properties:
        id: {type: string, format: uuid}
        fields: {type: array, items: {type: string}}
        beforeData: {type: object, additionalProperties: true}
        proposedData: {type: object, additionalProperties: true}
        createdAt: {type: string, format: date-time}

    AdminModerationRecord:
      allOf:
        - $ref: '#/components/schemas/PartnerModerationChange'
        - type: object
          required: [targetType, targetId, targetTitle, venueId, venueTitle, status, reviewComment, reviewedAt]
          properties:
            targetType: {type: string, enum: [venue, room]}
            targetId: {type: string, format: uuid}
            targetTitle: {type: string}
            venueId: {type: string, format: uuid}
            venueTitle: {type: string}
            submittedById: {type: [string, 'null'], format: uuid}
            submittedByName: {type: [string, 'null']}
            submittedByEmail: {type: [string, 'null'], format: email}
            status: {type: string, enum: [pending, approved, rejected]}
            reviewComment: {type: [string, 'null']}
            reviewedById: {type: [string, 'null'], format: uuid}
            reviewedAt: {type: [string, 'null'], format: date-time}

    AdminModerationDecision:
      type: object
      additionalProperties: false
      properties:
        comment: {type: string, maxLength: 1000}

    PartnerVenue:
      allOf:
        - $ref: '#/components/schemas/Venue'
        - type: object
          required: [venueType, contactName, contactPhone, contactEmail, weekSchedule, scheduleExceptions]
          properties:
            venueType: {type: string}
            contactName: {type: string}
            contactPhone: {type: string}
            contactEmail: {type: string}
            weekSchedule:
              type: array
              items: {$ref: '#/components/schemas/PartnerWeekScheduleDay'}
            scheduleExceptions:
              type: array
              items: {$ref: '#/components/schemas/PartnerScheduleException'}
            pendingChange:
              oneOf:
                - $ref: '#/components/schemas/PartnerModerationChange'
                - type: 'null'

    PartnerVenueWrite:
      type: object
      additionalProperties: false
      required: [title, city, address, venueType, description, rules, contactName, contactPhone, contactEmail, amenities, paymentMethods, weekSchedule]
      properties:
        title: {type: string, minLength: 2, maxLength: 160}
        city: {type: string, minLength: 2, maxLength: 100}
        address: {type: string, minLength: 3, maxLength: 300}
        venueType: {type: string, minLength: 2, maxLength: 120}
        description: {type: string, minLength: 10, maxLength: 5000}
        rules: {type: string, maxLength: 5000}
        contactName: {type: string, minLength: 2, maxLength: 120}
        contactPhone: {type: string, minLength: 6, maxLength: 30}
        contactEmail: {type: string, maxLength: 320}
        amenities: {type: array, maxItems: 50, items: {type: string}}
        paymentMethods:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, enum: [card, cash]}
        weekSchedule:
          type: array
          minItems: 7
          maxItems: 7
          items: {$ref: '#/components/schemas/PartnerWeekScheduleDay'}

    PartnerScheduleExceptionWrite:
      type: object
      additionalProperties: false
      required: [mode, opensAtHour, closesAtHour, note]
      properties:
        mode: {type: string, enum: [closed, custom]}
        opensAtHour: {type: [number, 'null'], minimum: 0, maximum: 23.5, multipleOf: 0.5}
        closesAtHour: {type: [number, 'null'], minimum: 0.5, maximum: 30, multipleOf: 0.5}
        note: {type: string, maxLength: 500}

    PartnerRoom:
      type: object
      required: [id, slug, venueId, title, subtitle, type, capacityMin, capacityMax, pricePerHour, minimumHours, description, rules, features, tags, photoPaths, services, opensAtHour, closesAtHour, bufferMinutes, publicationStatus]
      properties:
        id: {type: string, format: uuid}
        slug: {type: string}
        venueId: {type: string, format: uuid}
        title: {type: string}
        subtitle: {type: string}
        type: {type: string}
        capacityMin: {type: integer, minimum: 1}
        capacityMax: {type: integer, minimum: 1}
        pricePerHour: {type: number, minimum: 0}
        minimumHours: {type: number, minimum: 0.5, multipleOf: 0.5}
        rating: {type: number, minimum: 0, maximum: 5}
        reviewCount: {type: integer, minimum: 0}
        description: {type: string}
        rules: {type: string}
        promotion: {type: [string, 'null']}
        features: {type: array, items: {type: string}}
        tags: {type: array, items: {type: string}}
        photoPaths: {type: array, items: {type: string}}
        services: {type: array, items: {$ref: '#/components/schemas/RoomService'}}
        opensAtHour: {type: number, minimum: 0, maximum: 23.5, multipleOf: 0.5}
        closesAtHour: {type: number, minimum: 0.5, maximum: 30, multipleOf: 0.5}
        bufferMinutes: {type: integer, enum: [0, 15, 30, 45, 60]}
        publicationStatus: {type: string, enum: [review, published, hidden]}
        pendingChange:
          oneOf:
            - $ref: '#/components/schemas/PartnerModerationChange'
            - type: 'null'

    PartnerRoomWrite:
      type: object
      additionalProperties: false
      required: [title, subtitle, type, description, rules, promotion, capacityMin, capacityMax, pricePerHour, minimumHours, bufferMinutes, opensAtHour, closesAtHour, features, tags, services, status]
      properties:
        title: {type: string, minLength: 2, maxLength: 160}
        subtitle: {type: string, minLength: 2, maxLength: 160}
        type: {type: string, minLength: 2, maxLength: 80}
        description: {type: string, minLength: 10, maxLength: 5000}
        rules: {type: string, maxLength: 5000}
        promotion: {type: string, maxLength: 2000}
        capacityMin: {type: integer, minimum: 1, maximum: 1000}
        capacityMax: {type: integer, minimum: 1, maximum: 1000}
        pricePerHour: {type: number, minimum: 0}
        minimumHours: {type: number, minimum: 0.5, maximum: 24, multipleOf: 0.5}
        bufferMinutes: {type: integer, enum: [0, 15, 30, 45, 60]}
        opensAtHour: {type: number, minimum: 0, maximum: 23.5, multipleOf: 0.5}
        closesAtHour: {type: number, minimum: 0.5, maximum: 30, multipleOf: 0.5}
        features: {type: array, maxItems: 50, uniqueItems: true, items: {type: string}}
        tags: {type: array, maxItems: 50, uniqueItems: true, items: {type: string}}
        services:
          type: array
          maxItems: 50
          items:
            type: object
            required: [name, description, price]
            properties:
              id: {type: string}
              name: {type: string}
              description: {type: string}
              price: {type: number, minimum: 0}
        status: {type: string, enum: [review, published, hidden]}

    RoomSummary:
      type: object
      required: [id, slug, venue, title, subtitle, type, capacityMax, pricePerHour, minimumHours, photos]
      properties:
        id: {type: string, format: uuid}
        slug: {type: string}
        venue: {$ref: '#/components/schemas/Venue'}
        title: {type: string}
        subtitle: {type: string}
        type: {type: string}
        capacityMin: {type: integer, minimum: 1}
        capacityMax: {type: integer, minimum: 1}
        pricePerHour: {type: number, minimum: 0}
        minimumHours: {type: number, minimum: 0.5, multipleOf: 0.5}
        rating: {type: number, minimum: 0, maximum: 5}
        reviewCount: {type: integer, minimum: 0}
        features: {type: array, items: {type: string}}
        tags: {type: array, items: {type: string}}
        promotion: {type: [string, 'null']}
        photos: {type: array, items: {type: string, format: uri}}
        nearestWindows: {type: array, items: {$ref: '#/components/schemas/AvailabilityWindow'}}

    RoomDetail:
      allOf:
        - $ref: '#/components/schemas/RoomSummary'
        - type: object
          properties:
            description: {type: string}
            rules: {type: string}
            opensAtHour: {type: number, minimum: 0, maximum: 47.5, multipleOf: 0.5}
            closesAtHour: {type: number, minimum: 0, maximum: 48, multipleOf: 0.5}
            bufferMinutes: {type: integer, enum: [0, 15, 30, 45, 60]}
            services: {type: array, items: {$ref: '#/components/schemas/RoomService'}}
            availability: {$ref: '#/components/schemas/AvailabilityResponse'}

    RoomWrite:
      type: object
      required: [title, type, capacityMax, pricePerHour, minimumHours]
      properties:
        title: {type: string, minLength: 2}
        type: {type: string}
        description: {type: string}
        rules: {type: string}
        promotion: {type: string}
        capacityMin: {type: integer, minimum: 1, default: 1}
        capacityMax: {type: integer, minimum: 1}
        pricePerHour: {type: number, minimum: 0}
        minimumHours: {type: number, minimum: 0.5, multipleOf: 0.5}
        bufferMinutes: {type: integer, enum: [0, 15, 30, 45, 60]}
        features: {type: array, items: {type: string}}

    RoomService:
      type: object
      required: [id, name, price]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: [string, 'null']}
        price: {type: number, minimum: 0}

    RoomSearchResult:
      type: object
      required: [items, hasMore]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/RoomSummary'}}
        nextCursor: {type: [string, 'null']}
        hasMore: {type: boolean}

    PublicReview:
      type: object
      required: [id, roomId, authorName, rating, publishedAt]
      properties:
        id: {type: string, format: uuid}
        roomId: {type: string, format: uuid}
        authorName: {type: string, description: First name or a generic privacy-safe label}
        rating: {type: integer, minimum: 1, maximum: 5}
        body: {type: [string, 'null']}
        partnerReply: {type: [string, 'null']}
        publishedAt: {type: string, format: date-time}

    PublicReviewPage:
      type: object
      required: [items, hasMore]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/PublicReview'}}
        nextCursor: {type: [string, 'null']}
        hasMore: {type: boolean, const: false}

    AvailabilityRequest:
      type: object
      required: [roomIds, date, durationMinutes]
      properties:
        roomIds:
          type: array
          minItems: 1
          items: {type: string, format: uuid}
        date: {type: string, format: date}
        durationMinutes: {type: integer, minimum: 30, multipleOf: 30}
        preferredTime: {type: [string, 'null']}
        guests: {type: integer, minimum: 1}

    AvailabilityResponse:
      type: object
      required: [date, timezone, windows]
      properties:
        date: {type: string, format: date}
        timezone: {type: string, example: Europe/Moscow}
        windows: {type: array, items: {$ref: '#/components/schemas/AvailabilityWindow'}}

    AvailabilityWindow:
      type: object
      required: [startsAt, maximumDurationMinutes]
      properties:
        startsAt: {type: string, format: date-time}
        maximumDurationMinutes: {type: integer, minimum: 30, multipleOf: 30}
        exactMatch: {type: boolean}

    BookingCreate:
      type: object
      required: [primaryRoomId, roomIds, startsAt, durationMinutes, guests, legal]
      properties:
        primaryRoomId: {type: string, format: uuid}
        roomIds:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, format: uuid}
        startsAt: {type: string, format: date-time}
        durationMinutes: {type: integer, minimum: 30, multipleOf: 30}
        guests: {type: integer, minimum: 1}
        eventType: {type: [string, 'null']}
        eventName: {type: [string, 'null']}
        serviceIds: {type: array, items: {type: string, format: uuid}}
        onSitePaymentMethod: {type: string, enum: [card, cash]}
        comment: {type: string, maxLength: 2000}
        legal:
          type: object
          required: [termsVersion, privacyVersion, acceptedAt]
          properties:
            termsVersion: {type: string}
            privacyVersion: {type: string}
            acceptedAt: {type: string, format: date-time}

    MoneyBreakdown:
      type: object
      required: [roomTotal, serviceTotal, total, prepayment, remainingOnSite, currency]
      properties:
        roomTotal: {type: number}
        serviceTotal: {type: number}
        total: {type: number}
        prepayment: {type: number, description: 30 percent of total}
        remainingOnSite: {type: number}
        currency: {type: string, const: RUB}

    BookingRoom:
      type: object
      required: [id, slug, title, type, capacityMax, pricePerHour, amount, isPrimary, bufferMinutes]
      properties:
        id: {type: string, format: uuid}
        slug: {type: string}
        title: {type: string}
        type: {type: string}
        capacityMax: {type: integer, minimum: 1}
        pricePerHour: {type: number, minimum: 0}
        amount: {type: number, minimum: 0}
        isPrimary: {type: boolean}
        bufferMinutes: {type: integer, minimum: 0, maximum: 60}

    BookingService:
      type: object
      required: [id, name, price, quantity, amount]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: [string, 'null']}
        price: {type: number, minimum: 0}
        quantity: {type: integer, minimum: 1}
        amount: {type: number, minimum: 0}

    Booking:
      type: object
      required: [id, publicNumber, status, venue, rooms, startsAt, endsAt, guests, money, proposal, unreadMessages]
      properties:
        id: {type: string, format: uuid}
        publicNumber: {type: string}
        status: {type: string, enum: [pending, proposed, awaiting_payment, paid, expired, cancelled, visited, completed]}
        venue: {$ref: '#/components/schemas/Venue'}
        rooms: {type: array, items: {$ref: '#/components/schemas/BookingRoom'}}
        startsAt: {type: string, format: date-time}
        endsAt: {type: string, format: date-time}
        guests: {type: integer}
        clientName: {type: string}
        clientPhone: {type: [string, 'null'], description: Null for partner before prepayment}
        clientEmail: {type: [string, 'null'], format: email, description: Null for partner before prepayment}
        eventType: {type: [string, 'null']}
        eventName: {type: [string, 'null']}
        onSitePaymentMethod: {type: string, enum: [card, cash]}
        comment: {type: string}
        cancellationReason: {type: [string, 'null']}
        cancelledBy: {type: [string, 'null'], enum: [client, partner, admin, null]}
        services: {type: array, items: {$ref: '#/components/schemas/BookingService'}}
        money: {$ref: '#/components/schemas/MoneyBreakdown'}
        proposal:
          anyOf:
            - $ref: '#/components/schemas/BookingTimeProposal'
            - type: 'null'
        unreadMessages: {type: integer, minimum: 0}
        paymentHoldExpiresAt: {type: [string, 'null'], format: date-time}
        createdAt: {type: string, format: date-time}

    BookingMessage:
      type: object
      required: [id, senderRole, body, createdAt, readBy]
      properties:
        id: {type: string, format: uuid}
        senderRole: {type: string, enum: [client, partner, admin]}
        body: {type: string}
        createdAt: {type: string, format: date-time}
        readBy:
          type: array
          uniqueItems: true
          items: {type: string, enum: [client, partner]}

    BookingTimeProposal:
      type: object
      required: [id, startsAt, endsAt, durationMinutes, comment, status, money, createdAt, respondedAt]
      properties:
        id: {type: string, format: uuid}
        startsAt: {type: string, format: date-time}
        endsAt: {type: string, format: date-time}
        durationMinutes: {type: integer, minimum: 30, multipleOf: 30}
        comment: {type: string}
        status: {type: string, enum: [pending, accepted, declined, superseded]}
        money: {$ref: '#/components/schemas/MoneyBreakdown'}
        createdAt: {type: string, format: date-time}
        respondedAt: {type: [string, 'null'], format: date-time}

    PartnerReservationWrite:
      type: object
      required: [roomId, startsAt, endsAt, type]
      properties:
        roomId: {type: string, format: uuid}
        startsAt: {type: string, format: date-time}
        endsAt: {type: string, format: date-time}
        type:
          type: string
          enum: [manual_booking, technical]
          description: Immutable after creation; PATCH may only update a record without changing its type.
        category: {type: string, enum: [technical, service, private]}
        clientName: {type: [string, 'null'], minLength: 2, maxLength: 100}
        clientPhone: {type: [string, 'null']}
        guests: {type: [integer, 'null'], minimum: 1}
        amount: {type: number, minimum: 0}
        source: {type: [string, 'null'], enum: [phone, whatsapp, telegram, walk_in, other, null]}
        comment: {type: string, maxLength: 2000}

    PartnerReservation:
      type: object
      required: [id, venueId, roomId, roomSlug, roomTitle, type, status, startsAt, endsAt, bufferMinutes, history, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        venueId: {type: string, format: uuid}
        roomId: {type: string, format: uuid}
        roomSlug: {type: string}
        roomTitle: {type: string}
        type: {type: string, enum: [manual_booking, technical]}
        category: {type: [string, 'null'], enum: [technical, service, private, null]}
        status: {type: string, enum: [active, cancelled]}
        startsAt: {type: string, format: date-time}
        endsAt: {type: string, format: date-time}
        clientName: {type: [string, 'null']}
        clientPhone: {type: [string, 'null']}
        guests: {type: [integer, 'null'], minimum: 1}
        amount: {type: number, minimum: 0}
        source: {type: [string, 'null'], enum: [phone, whatsapp, telegram, walk_in, other, null]}
        comment: {type: string}
        cancellationReason: {type: [string, 'null']}
        bufferMinutes: {type: integer, minimum: 0}
        history:
          type: array
          items:
            type: object
            required: [title, details, created]
            properties:
              title: {type: string}
              details: {type: string}
              created: {type: string, format: date-time}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}

    TimeProposal:
      type: object
      required: [startsAt, durationMinutes]
      properties:
        startsAt: {type: string, format: date-time}
        durationMinutes: {type: integer, minimum: 30, multipleOf: 30}
        comment: {type: string, maxLength: 1000}

    PaymentIntent:
      type: object
      required: [paymentId, bookingId, status, provider, providerPaymentId, amount, currency, redirectUrl, expiresAt, createdAt]
      properties:
        paymentId: {type: string, format: uuid}
        bookingId: {type: string, format: uuid}
        status: {type: string, enum: [pending, paid, failed]}
        provider: {type: string, enum: [rooms_demo]}
        providerPaymentId: {type: string}
        amount: {type: number}
        currency: {type: string, const: RUB}
        redirectUrl: {type: string, format: uri}
        expiresAt: {type: string, format: date-time}
        maskedCard: {type: [string, 'null']}
        receiptNumber: {type: [string, 'null']}
        createdAt: {type: string, format: date-time}
        paidAt: {type: [string, 'null'], format: date-time}

    NotificationSettings:
      type: object
      required: [siteEnabled, emailEnabled, telegramEnabled]
      properties:
        siteEnabled: {type: boolean, const: true}
        emailEnabled: {type: boolean}
        emailAddress: {type: [string, 'null'], format: email}
        telegramEnabled: {type: boolean}
        telegramChatId: {type: [string, 'null']}

    NotificationDelivery:
      type: object
      required: [id, channel, target, eventKey, title, status, attempts, createdAt]
      properties:
        id: {type: string, format: uuid}
        userId: {type: [string, 'null'], format: uuid}
        venueId: {type: [string, 'null'], format: uuid}
        channel: {type: string, enum: [email, telegram]}
        target: {type: string}
        eventKey: {type: string}
        title: {type: string}
        status: {type: string, enum: [queued, processing, sent, failed, cancelled]}
        attempts: {type: integer, minimum: 0}
        nextAttemptAt: {type: [string, 'null'], format: date-time}
        lastError: {type: [string, 'null']}
        createdAt: {type: string, format: date-time}
        sentAt: {type: [string, 'null'], format: date-time}

    MigrationValidation:
      type: object
      required: [valid, format, version, collections, warnings]
      properties:
        valid: {type: boolean}
        format: {type: string, const: rooms-migration}
        version: {type: integer, const: 1}
        collections: {type: object, additionalProperties: {type: integer}}
        warnings: {type: array, items: {type: string}}

    Error:
      type: object
      required: [code, message, requestId]
      properties:
        code: {type: string}
        message: {type: string}
        requestId: {type: string}
        fields:
          type: object
          additionalProperties: {type: string}
